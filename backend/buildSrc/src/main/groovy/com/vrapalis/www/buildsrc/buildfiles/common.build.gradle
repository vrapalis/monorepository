import com.vrapalis.www.buildsrc.utils.*

plugins {
    id 'java'
    id 'io.spring.dependency-management'
}

afterEvaluate {
    ext {
        JAR_FILE_BASE_NAME = "${archivesBaseName}-${version}.jar"
    }
}

group = "com.vrapalis.www.backend.${parent.name}"
archivesBaseName = "${parent.name}-${archivesBaseName}"
version = "0.0.1-${Utils.tagVersion}"

sourceCompatibility = '11'

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

repositories {
    jcenter()
    mavenCentral()
}

test {
    useJUnitPlatform()
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter'
    annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor'
    compileOnly 'org.springframework.boot:spring-boot-devtools'
    implementation 'org.springframework.boot:spring-boot-starter-validation'

    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    implementation group: 'com.google.guava', name: 'guava', version: '29.0-jre'

    implementation "org.mapstruct:mapstruct:${MAPSTRUCT_VERSION}"
    annotationProcessor "org.mapstruct:mapstruct-processor:${MAPSTRUCT_VERSION}"

    testImplementation "org.assertj:assertj-core:${ASSERTJ_VERSION}"
    testCompileOnly 'org.projectlombok:lombok'
    testAnnotationProcessor 'org.projectlombok:lombok'

    testImplementation('org.springframework.boot:spring-boot-starter-test') {
        exclude group: 'org.junit.vintage', module: 'junit-vintage-engine'
    }

    // TODO MAY BE FIND BETTER PLACE
    if (project.name != 'utils') {
        implementation project(':libs:utils')
    }
}

dependencyManagement {
    imports {
        mavenBom("org.springframework.boot:spring-boot-dependencies:${SPRING_BOOT_VERSION}")
        mavenBom "org.springframework.cloud:spring-cloud-dependencies:${SPRING_CLOUD_VERSION}"
    }
}